<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Strava Data Connector{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <h1>Strava Data Connector</h1>
            {% if session.get('athlete_id') %}
            <ul class="nav-links">
                <li><a href="/">Dashboard</a></li>
                <li><a href="/export/all">Export Data</a></li>
                <li>
                    <form method="POST" action="/auth/logout" style="display:inline;">
                        <button type="submit" class="nav-btn">Disconnect</button>
                    </form>
                </li>
            </ul>
            {% endif %}
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
</body>
</html>
